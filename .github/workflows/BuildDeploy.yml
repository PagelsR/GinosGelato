name: GinosGelato - Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  RESOURCE_GROUP: 'rg-GinosGelato'
  LOCATION: 'eastus2'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # ============================================================================
  # REQUIRED SECRETS CONFIGURATION
  # ============================================================================
  # TODO: Add AZURE_CREDENTIALS secret here for service principal authentication
  #       Format: JSON object with clientId, clientSecret, subscriptionId, tenantId
  #       Create via: az ad sp create-for-rbac --name "GinosGelato-GitHub-Actions" 
  #                   --role contributor --scopes /subscriptions/{subscription-id} --sdk-auth
  #
  # TODO: Add AZURE_SUBSCRIPTION_ID secret here
  #       Your Azure subscription ID (GUID format)
  # ============================================================================

  provision-infrastructure:
    name: 1️⃣ Provision Infrastructure (Bicep/IaC)
    runs-on: ubuntu-latest
    outputs:
      resourceGroupName: ${{ env.RESOURCE_GROUP }}
      appServiceName: ${{ steps.deploy.outputs.appServiceName }}
      appServiceUrl: ${{ steps.deploy.outputs.appServiceUrl }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy Bicep Infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./iac/main.bicep
          parameters: >
            location=${{ env.LOCATION }}
          deploymentName: 'ginosgelato-infra-${{ github.run_number }}'
          failOnStdErr: false
      
      - name: Infrastructure Deployment Summary
        run: |
          echo "### Infrastructure Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | ${{ env.RESOURCE_GROUP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App Service | ${{ steps.deploy.outputs.appServiceName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App Service URL | ${{ steps.deploy.outputs.appServiceUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Static Web App | ${{ steps.deploy.outputs.staticWebAppName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Location | ${{ env.LOCATION }} |" >> $GITHUB_STEP_SUMMARY

  build-and-deploy-backend:
    name: 3️⃣ Build, Test & Deploy Backend API
    runs-on: ubuntu-latest
    needs: [provision-infrastructure]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: |
          echo "Restoring NuGet packages..."
          dotnet restore
        working-directory: ./ginos-gelato/server
      
      - name: Build
        run: |
          echo "Building solution in Release mode..."
          dotnet build --configuration Release --no-restore
        working-directory: ./ginos-gelato/server
      
      - name: Run Tests
        run: |
          echo "Running unit tests..."
          dotnet test --configuration Release --no-build --verbosity normal
        working-directory: ./ginos-gelato/server
        continue-on-error: true
      
      - name: Publish
        run: |
          echo "Publishing application..."
          dotnet publish --configuration Release --no-build --output ./publish
        working-directory: ./ginos-gelato/server
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.provision-infrastructure.outputs.appServiceName }}
          package: ./ginos-gelato/server/publish
      
      - name: Verify Deployment
        run: |
          echo "Verifying API deployment..."
          API_URL="${{ needs.provision-infrastructure.outputs.appServiceUrl }}"
          echo "Testing endpoint: ${API_URL}/api/flavors"
          
          # Wait for app to be ready
          for i in {1..12}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/flavors" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API is responding (HTTP $HTTP_CODE)"
              curl -s "${API_URL}/api/flavors"
              break
            fi
            echo "⏳ Waiting for API to be ready (attempt $i/12, HTTP $HTTP_CODE)..."
            sleep 15
          done
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ API failed to respond after 12 attempts"
            echo "Final HTTP Code: $HTTP_CODE"
            exit 1
          fi
      
      - name: Backend Deployment Summary
        run: |
          echo "### Backend API Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| API URL | ${{ needs.provision-infrastructure.outputs.appServiceUrl }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flavors API | ${{ needs.provision-infrastructure.outputs.appServiceUrl }}/api/flavors |" >> $GITHUB_STEP_SUMMARY
          echo "| .NET Version | ${{ env.DOTNET_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Configuration | Release |" >> $GITHUB_STEP_SUMMARY

  build-and-deploy-frontend:
    name: 4️⃣ Build & Deploy Frontend (Static Web App)
    runs-on: ubuntu-latest
    needs: [provision-infrastructure, build-and-deploy-backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './ginos-gelato/client/package-lock.json'
      
      - name: Install dependencies
        run: |
          echo "Installing npm packages..."
          npm ci
        working-directory: ./ginos-gelato/client
      
      - name: Configure API URL for production
        run: |
          API_URL="${{ needs.provision-infrastructure.outputs.appServiceUrl }}"
          echo "Configuring API URL: $API_URL"
          echo "VITE_API_URL=$API_URL" > .env.production
          cat .env.production
        working-directory: ./ginos-gelato/client
      
      - name: Build Frontend
        run: |
          echo "Building frontend application..."
          npm run build
        working-directory: ./ginos-gelato/client
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Get Static Web App Deployment Token
        id: get-swa-token
        run: |
          echo "Retrieving Static Web App deployment token..."
          SWA_TOKEN=$(az staticwebapp secrets list \
            --name ${{ needs.provision-infrastructure.outputs.staticWebAppName }} \
            --resource-group ${{ needs.provision-infrastructure.outputs.resourceGroupName }} \
            --query properties.apiKey -o tsv)
          
          echo "::add-mask::$SWA_TOKEN"
          echo "SWA_TOKEN=$SWA_TOKEN" >> $GITHUB_OUTPUT
          echo "Successfully retrieved deployment token"
      
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-swa-token.outputs.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './ginos-gelato/client/dist'
          skip_app_build: true
      
      - name: Frontend Deployment Summary
        run: |
          echo "### Frontend Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Web App | ${{ needs.provision-infrastructure.outputs.staticWebAppName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Version | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Tool | Vite + React + TypeScript |" >> $GITHUB_STEP_SUMMARY

  post-deployment-verification:
    name: 5️⃣ Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: [provision-infrastructure, build-and-deploy-backend, build-and-deploy-frontend]
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Verify Backend Health
        run: |
          echo "Checking Backend API health..."
          API_URL="${{ needs.provision-infrastructure.outputs.appServiceUrl }}"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/flavors")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Backend API is healthy (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Backend API returned HTTP $HTTP_CODE"
          fi
      
      - name: Final Deployment Report
        run: |
          echo "## Gino's Gelato Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**1. Infrastructure Provisioned** - All Azure resources created in `${{ env.LOCATION }}`" >> $GITHUB_STEP_SUMMARY
          echo "**2. Backend API Deployed** - .NET 8 API running on App Service" >> $GITHUB_STEP_SUMMARY
          echo "**3. Frontend Deployed** - React app hosted on Static Web App" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access Points" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: ${{ needs.provision-infrastructure.outputs.appServiceUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Flavors API**: ${{ needs.provision-infrastructure.outputs.appServiceUrl }}/api/flavors" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- HTTPS enforced for App Service" >> $GITHUB_STEP_SUMMARY
          echo "- Static Web App secured with deployment token" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Test the application end-to-end" >> $GITHUB_STEP_SUMMARY
          echo "2. Monitor App Service logs for any issues" >> $GITHUB_STEP_SUMMARY
